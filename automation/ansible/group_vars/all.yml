ansible_python_interpreter: /opt/devops-venv/bin/python3  # Must be set here, not in ansible.cfg [defaults]

# Jenkins Configuration
jenkins_admin_user: "admin"
jenkins_admin_password: "admin_password_changed_later"
jenkins_java_opts: "-Djenkins.install.runSetupWizard=false"

# User-Provided Secrets (Override these via CLI extra-vars or a secrets.yml)

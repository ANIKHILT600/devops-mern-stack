---
- name: Configure Jenkins Server (CI/CD Master)
  hosts: jenkins_server
  become: true
  vars_files:
    - group_vars/all.yml

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install Common Dependencies
      apt:
        name:
          - openjdk-17-jre
          - openjdk-17-jdk
          - wget
          - curl
          - git
          - gnupg
        state: present

    - name: Add Jenkins GPG Key
      get_url:
        url: https://pkg.jenkins.io/debian/jenkins.io-2023.key
        dest: /usr/share/keyrings/jenkins-keyring.asc

    - name: Add Jenkins Repository
      apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian binary/"
        state: present

    - name: Install Jenkins
      apt:
        name: jenkins
        state: present
        update_cache: yes

    - name: Start and Enable Jenkins Service
      service:
        name: jenkins
        state: started
        enabled: yes

    - name: Wait for Jenkins to become available on port 8080
      wait_for:
        port: 8080
        delay: 15
        timeout: 120
        state: started

    # ─────────────────────────────────────────────
    # PLUGINS
    # FIX: Use jenkins-plugin-cli (correct method for Jenkins 2.x)
    # NOT 'java -jar jenkins.war --plugin-cli' (that's for offline installs)
    # The plugins listed here are all referenced in the Jenkinsfiles:
    #   - workflow-aggregator  → Pipeline support
    #   - git                  → git checkout steps
    #   - sonar                → SonarQube integration
    #   - aws-credentials      → AWS credential binding
    #   - ssh-slaves           → SSH agent node support
    #   - credentials-binding  → withCredentials block
    #   - ansicolor            → ANSI color output in console
    #   - nodejs               → nodejs tool (Jenkins-Pipeline-Script/Jenkinsfile-Backend/Frontend)
    #   - build-timeout        → timeout() step
    #   - pipeline-stage-view  → Stage view UI in Jenkins
    # ─────────────────────────────────────────────
    - name: Install Jenkins Plugins via jenkins-plugin-cli
      shell: |
        jenkins-plugin-cli --plugins \
          workflow-aggregator \
          git \
          sonar \
          pipeline-stage-view \
          workflow-job \
          credentials-binding \
          aws-credentials \
          ssh-slaves \
          plain-credentials \
          ansicolor \
          nodejs \
          build-timeout \
          blueocean \
          github
      become: yes
      become_user: jenkins
      register: plugin_install
      changed_when: true
      notify: Restart Jenkins

    - name: Create Jenkins Init Directory
      file:
        path: /var/lib/jenkins/init.groovy.d
        state: directory
        owner: jenkins
        group: jenkins
        mode: '0755'

    - name: Configure Jenkins Security (Admin User)
      copy:
        dest: /var/lib/jenkins/init.groovy.d/01-security.groovy
        content: |
          #!groovy
          import jenkins.model.*
          import hudson.security.*
          import jenkins.install.*

          def instance = Jenkins.getInstance()
          def hudsonRealm = new HudsonPrivateSecurityRealm(false)
          hudsonRealm.createAccount("{{ jenkins_admin_user }}", "{{ jenkins_admin_password }}")
          instance.setSecurityRealm(hudsonRealm)

          def strategy = new FullControlOnceLoggedInAuthorizationStrategy()
          instance.setAuthorizationStrategy(strategy)
          instance.save()
          InstallState.INITIAL_SETUP_COMPLETED.initializeState()
        owner: jenkins
        group: jenkins
        mode: '0755'
      notify: Restart Jenkins

    - name: Configure Jenkins Credentials & Agent
      copy:
        dest: /var/lib/jenkins/init.groovy.d/02-agent-setup.groovy
        content: |
          #!groovy
          import jenkins.model.*
          import com.cloudbees.plugins.credentials.*
          import com.cloudbees.plugins.credentials.common.*
          import com.cloudbees.plugins.credentials.domains.*
          import com.cloudbees.jenkins.plugins.sshcredentials.impl.*
          import hudson.plugins.sshslaves.*
          import hudson.model.*
          import hudson.slaves.*
          import hudson.tools.*

          // 1. Add SSH Private Key Credential
          def key = """{{ lookup('file', 'private_key.pem') }}"""
          def credentialsStore = SystemCredentialsProvider.getInstance().getStore()
          def domain = Domain.global()
          def privateKey = new BasicSSHUserPrivateKey(
            CredentialsScope.GLOBAL,
            "infra-ssh-key",
            "ubuntu",
            new BasicSSHUserPrivateKey.DirectEntryPrivateKeySource(key),
            "",
            "SSH Key for Agents"
          )
          credentialsStore.addCredentials(domain, privateKey)

          // 2. Add SonarQube Token
          import org.jenkinsci.plugins.plaincredentials.impl.StringCredentialsImpl
          def sonarToken = new StringCredentialsImpl(
             CredentialsScope.GLOBAL,
             "sonar-token",
             "SonarQube Token",
             Secret.fromString("{{ sonar_token }}")
          )
          credentialsStore.addCredentials(domain, sonarToken)

          // 3. Add GitHub Credentials (Username/Password)
          import com.cloudbees.plugins.credentials.impl.UsernamePasswordCredentialsImpl
          def githubCreds = new UsernamePasswordCredentialsImpl(
            CredentialsScope.GLOBAL,
            "GITHUB",
            "GitHub Credentials",
            "{{ github_username }}",
            "{{ github_token }}"
          )
          credentialsStore.addCredentials(domain, githubCreds)

          // 4. Add GitHub Token (Secret Text) — used in Jenkinsfile git push
          def githubToken = new StringCredentialsImpl(
             CredentialsScope.GLOBAL,
             "github",
             "GitHub Token",
             Secret.fromString("{{ github_token }}")
          )
          credentialsStore.addCredentials(domain, githubToken)

          // 5. Add AWS Account ID
          def accountId = new StringCredentialsImpl(
             CredentialsScope.GLOBAL,
             "AWS_ACCOUNT_ID",
             "AWS Account ID",
             Secret.fromString("{{ aws_account_id }}")
          )
          credentialsStore.addCredentials(domain, accountId)

          // 6. Add ECR Repo Names (used by Jenkinsfile-Backend/Frontend)
          // CRITICAL: These values MUST match the ECR repo names created by Terraform
          // AND the image name in K8s-Manifests/Backend/deployment.yaml (backend:1)
          // AND K8s-Manifests/Frontend/deployment.yaml (frontend:1)
          // The Jenkins sed command: s/${ECR_REPO_NAME}:${oldTag}/${ECR_REPO_NAME}:${BUILD}/ only works
          // if ECR_REPO_NAME appears verbatim in the image URL in deployment.yaml.
          credentialsStore.addCredentials(domain, new StringCredentialsImpl(CredentialsScope.GLOBAL, "ECR_REPO_FRONTEND", "Frontend ECR Repo", Secret.fromString("frontend")))
          credentialsStore.addCredentials(domain, new StringCredentialsImpl(CredentialsScope.GLOBAL, "ECR_REPO_BACKEND", "Backend ECR Repo", Secret.fromString("backend")))

          // 7. Configure Agent Node (Infra Mgmt Server)
          def agentName = "infra-mgmt"
          def agentDesc = "Infrastructure Management Server (Jenkins Agent)"
          def agentPath = "/home/ubuntu/jenkins_agent"
          def agentIp = "{{ infra_mgmt_private_ip }}"

          if (Jenkins.instance.getNode(agentName) == null) {
              def launcher = new SSHLauncher(
                  agentIp, 22, "infra-ssh-key",
                  (String)null, (String)null, (String)null, (String)null,
                  (Integer)null, (Integer)null, (Integer)null,
                  new NonVerifyingKeyVerificationStrategy()
              )
              DumbSlave agent = new DumbSlave(
                  agentName, agentDesc, agentPath, "2",
                  Node.Mode.NORMAL, "infra-mgmt", launcher,
                  new RetentionStrategy.Always(), new LinkedList()
              )
              Jenkins.instance.addNode(agent)
              println "Agent ${agentName} created successfully"
          }
        owner: jenkins
        group: jenkins
        mode: '0755'
      notify: Restart Jenkins

    # ─────────────────────────────────────────────
    # SONARQUBE SERVER CONFIGURATION
    # Groovy script that registers SonarQube server in Jenkins
    # so withSonarQubeEnv('sonar-server') in Jenkinsfiles works.
    # Name 'sonar-server' MUST match what Jenkinsfile-Backend/Frontend use.
    # ─────────────────────────────────────────────
    - name: Configure SonarQube Server in Jenkins
      copy:
        dest: /var/lib/jenkins/init.groovy.d/03-sonar-server.groovy
        content: |
          #!groovy
          import jenkins.model.*
          import hudson.plugins.sonar.*
          import hudson.plugins.sonar.model.*

          def instance = Jenkins.getInstance()
          def sonarDesc = instance.getDescriptor(SonarGlobalConfiguration.class)

          def sonarInstallation = new SonarInstallation(
            "sonar-server",
            "http://{{ infra_mgmt_private_ip }}:9000",
            "sonar-token",
            null, null, null, null, null
          )
          sonarDesc.setInstallations(sonarInstallation)
          sonarDesc.save()
          println "SonarQube server 'sonar-server' configured at http://{{ infra_mgmt_private_ip }}:9000"
        owner: jenkins
        group: jenkins
        mode: '0755'
      notify: Restart Jenkins

  handlers:
    - name: Restart Jenkins
      service:
        name: jenkins
        state: restarted
      listen: Restart Jenkins

    - name: Wait for Jenkins after restart
      wait_for:
        port: 8080
        delay: 20
        timeout: 120
        state: started
      listen: Restart Jenkins
